<link rel="stylesheet" href="/static/style.css">
{% include "dashboard.html" %}

<div class="main">
<h2>Report</h2>

{% if session.role == "TEACHER" %}
<form method="POST">
<input name="student">
<input name="marks">

{% endif %}

{% for r in data %}

{% endfor %}
</div>
