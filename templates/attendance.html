<link rel="stylesheet" href="/static/style.css">
{% include "dashboard.html" %}

<div class="main">
<h2>Attendance</h2>

{% if session.role == "TEACHER" %}
<form method="POST">
<input name="student" placeholder="Student">
<input name="date">
<select name="status">
<option>Present</option>
<option>Absent</option>
</select>
<button>Add</button>
</form>
{% endif %}

{% for r in data %}
<div class="card">{{r.student}} - {{r.date}} - {{r.status}}</div>
{% endfor %}
</div>
